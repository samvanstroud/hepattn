seed_everything: 42
name: TRK-v8-strip-lca-th0p3-w512-enc512-epochs30
data:
  train_dir:  /share/rcif2/pduckett/data/prepped/train/
  val_dir: /share/rcif2/pduckett/data/prepped/val/
  test_dir: /share/rcif2/pduckett/data/prepped/test/

  hit_eval_train: /share/rcif2/pduckett/hepattn-dq-pr/src/hepattn/experiments/trackml/logs/HC-v3-lite-strips-separate-encoders_20260318-T195557/ckpts/epoch=077-val_loss=0.27351_train_eval.h5
  hit_eval_val: /share/rcif2/pduckett/hepattn-dq-pr/src/hepattn/experiments/trackml/logs/HC-v3-lite-strips-separate-encoders_20260318-T195557/ckpts/epoch=077-val_loss=0.27351_val_eval.h5
  hit_eval_test: /share/rcif2/pduckett/hepattn-dq-pr/src/hepattn/experiments/trackml/logs/HC-v3-lite-strips-separate-encoders_20260318-T195557/ckpts/epoch=077-val_loss=0.27351_test_eval.h5
  hit_filter_threshold: 0.42

  # hit_eval_train: /projects/u5du/pduckett/filter_evals/eta2p5pt600/epoch=100-val_loss=0.15778_train_eval.h5
  # hit_eval_val: /projects/u5du/pduckett/filter_evals/eta2p5pt600/epoch=100-val_loss=0.15778_val_eval.h5
  # hit_eval_test: /projects/u5du/pduckett/filter_evals/eta2p5pt600/epoch=100-val_loss=0.15778_test_eval.h5
  # hit_filter_threshold: 0.2

  num_workers: 15
  num_train: -1
  num_test: -1
  num_val: -1

  # Select only hits from these detector volumes
  # pix barrel: 8, pix endcap: 7, 9
  # See: https://competitions.codalab.org/competitions/20112
  hit_volume_ids: [7, 8, 9, 12, 13, 14]

  feature_volume_ids:
    pixel: [7, 8, 9]
    strip: [12, 13, 14]

  # Minimum pt for a particle to be deemed reconstructible
  particle_min_pt: 0.6

  # Maximum absolute eta for a particle to be deemed reconstructible
  particle_max_abs_eta: 4

  # Minimum number of true hits for a particle to be deemed reconstructible
  particle_min_num_hits: 7

  # Maximum number of reconstructable particles allowed in an event
  event_max_num_particles: &num_objects 2400
  strict_max_objects: false

  # Define which inputs will be available to the model
  inputs:
    pixel:
      # Global hit coords
      - x
      - y
      - z
      - r
      - s
      - eta
      - phi
      - u
      - v
      - s
      # Hit local charge information
      - charge_frac
      - leta
      - lphi
      - lx
      - ly
      - lz
      - geta
      - gphi
    strip:
      # Global hit coords
      - x
      - y
      - z
      - r
      - s
      - eta
      - phi
      - u
      - v

  targets:
    pixel:
      - is_first
    particle:
      - pt
      - eta
      - phi
      - px
      - py
      - pz

trainer:
  # Training stuff here
  max_epochs: 30
  accelerator: gpu
  devices: 2
  precision: bf16-mixed
  log_every_n_steps: 50
  default_root_dir: /share/rcif2/pduckett/hepattn-dq-pr/logs/
  gradient_clip_val: 0.1
  enable_progress_bar: true

  #profiler:
  #  class_path: lightning.pytorch.profilers.PyTorchProfiler
  #  init_args:
  #    dirpath: ./profile_logs/
  #    filename: profile.json
  #    row_limit: 100
  #    sort_by_key: cpu_time_total

  logger:
    class_path: hepattn.utils.loggers.MyCometLogger
    init_args:
      project: trackml_tracking

  callbacks:
    # - class_path: hepattn.callbacks.AttnMaskLogger
    #   init_args:
    #     log_every_n_batches: 1000
    - class_path: hepattn.callbacks.Compile
      init_args:
        skip_dynamic_cudagraphs: true
        #mode: max-autotune # use for fastest inference
    - class_path: hepattn.callbacks.MemoryStats
    - class_path: hepattn.callbacks.InferenceTimer
    - class_path: hepattn.callbacks.SaveConfig
    - class_path: hepattn.callbacks.Checkpoint
      init_args:
        monitor: val/loss
    - class_path: hepattn.callbacks.PredictionWriter
      init_args:
        write_inputs: false
        write_outputs: true
        write_preds: true
        write_targets: true
        write_losses: false
    - class_path: lightning.pytorch.callbacks.LearningRateMonitor
    - class_path: lightning.pytorch.callbacks.TQDMProgressBar
      init_args:
        refresh_rate: 50

model:
  optimizer: Lion

  # Learning rate scheduler config
  lrs_config:
    initial: 1e-5
    max: 5e-5
    end: 1e-5
    pct_start: 0.02
    skip_scheduler: false
    weight_decay: 1e-5

  # Whether to use multi task learning or not
  mtl: false


  model:
    class_path: hepattn.models.MaskFormer
    init_args:
      dim: &dim 256
      sorter:
        class_path: hepattn.utils.sorter.Sorter
        init_args:
          input_sort_field: phi
      unified_decoding: true
      dynamic_query_source: pixel
      input_nets:
        class_path: torch.nn.ModuleList
        init_args:
          modules:
            - class_path: hepattn.models.InputNet
              init_args:
                input_name: pixel
                fields:
                  - x
                  - y
                  - z
                  - r
                  - eta
                  - phi
                  - u
                  - v
                  - s
                  - charge_frac
                  - leta
                  - lphi
                  - lx
                  - ly
                  - lz
                  - geta
                  - gphi
                net:
                  class_path: hepattn.models.Dense
                  init_args:
                    input_size: 17
                    hidden_layers: [128]
                    output_size: *dim
                    activation: SwiGLU
                posenc:
                  class_path: hepattn.models.PositionEncoder
                  init_args:
                    input_name: pixel
                    fields:
                      - r
                      - eta
                      - phi
                    dim: *dim
            - class_path: hepattn.models.InputNet
              init_args:
                input_name: strip
                fields:
                  - x
                  - y
                  - z
                  - r
                  - eta
                  - phi
                  - u
                  - v
                  - s
                net:
                  class_path: hepattn.models.Dense
                  init_args:
                    input_size: 9
                    hidden_layers: [128]
                    output_size: *dim
                    activation: SwiGLU
                posenc:
                  class_path: hepattn.models.PositionEncoder
                  init_args:
                    input_name: strip
                    fields:
                      - r
                      - eta
                      - phi
                    dim: *dim

      encoder:
        class_path: hepattn.models.Encoder
        init_args:
          num_layers: 8
          dim: *dim
          attn_type: flash
          window_size: 512
          window_wrap: true
          hybrid_norm: true
          norm: CustomLayerNorm
          dense_kwargs: {activation: SwiGLU}
          attn_kwargs: {bias: false}
      decoder:
        dynamic_queries: true
        dynamic_query_source: pixel
        num_decoder_layers: &num_dec_layers 3
        num_queries: *num_objects
        mask_attention: false
        local_strided_attn: true
        window_size: 512
        window_wrap: true
        block_size: 16
        use_query_masks: false
        unmask_all_false: false
        decoder_layer_config:
          dim: *dim
          norm: CustomLayerNorm
          hybrid_norm: true
          attn_kwargs: {bias: false, attn_type: flex}
          bidirectional_ca: false

      encoder_tasks:
        class_path: torch.nn.ModuleList
        init_args:
          modules:
            - class_path: hepattn.models.task.ClassificationTask
              init_args:
                name: query_init
                input_object: pixel
                classes: ["is_first"]
                loss_weight: 1.0
                threshold: 0.3
                permute_loss: false
                net:
                  class_path: hepattn.models.Dense
                  init_args:
                    input_size: *dim
                    hidden_layers: [256]
                    output_size: 1

      tasks:
        class_path: torch.nn.ModuleList
        init_args:
          modules:
            - class_path: hepattn.models.task.ObjectClassificationTask
              init_args:
                name: track_valid
                input_object: query
                output_object: track
                target_object: particle
                has_intermediate_loss: true
                has_first_layer_loss: false
                dim: *dim
                losses:
                  object_bce: 0.1
                costs:
                  object_bce: 0.1
                null_weight: 1.0

            - class_path: hepattn.models.task.ObjectHitMaskTask
              init_args:
                name: track_hit_valid
                input_constituent: key
                input_object: query
                output_object: track
                target_object: particle
                dim: *dim
                losses:
                  mask_dice: 2.0
                  mask_focal: 25.0
                costs:
                  mask_dice: 2.0
                  mask_focal: 25.0
                null_weight: 1.0

            - class_path: hepattn.models.task.IoUPredictionTask
              init_args:
                mask_task_name: track_hit_valid
                name: track_iou
                input_object: query
                mask_logit_key: track_key_logit
                target_mask_key: particle_hit
                dim: *dim
                loss_weight: 2.0

      matcher:
        class_path: hepattn.models.matcher.Matcher
        init_args:
          default_solver: scipy
          adaptive_solver: true
          n_jobs: *num_dec_layers
          parallel_solver: true
          parallel_backend: process
